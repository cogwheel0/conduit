---
# Authelia configuration for Conduit bug reproduction
# Minimal setup: file-based users, SQLite storage, no Redis, no LDAP, no real email

server:
  address: 'tcp://:9091'

log:
  level: 'debug'

# Use filesystem for auth notifications (no SMTP needed)
notifier:
  filesystem:
    filename: '/data/notification.txt'

# File-based authentication (no LDAP)
authentication_backend:
  file:
    path: '/config/users_database.yml'
    password:
      algorithm: argon2
      argon2:
        variant: argon2id
        iterations: 3
        memory: 65536
        parallelism: 4
        key_length: 32
        salt_length: 16

# SQLite storage (no Postgres/MySQL needed)
storage:
  local:
    path: '/data/db.sqlite3'
  encryption_key: '${AUTHELIA_STORAGE_ENCRYPTION_KEY}'

# Session cookie config
session:
  name: 'authelia_session'
  same_site: 'none'
  secret: '${AUTHELIA_SESSION_SECRET}'
  expiration: '1h'
  inactivity: '30m'
  cookies:
    - domain: 'localtest.me'
      subdomain: 'auth'
      default_redirection_url: 'https://chat.localtest.me'

# Access control
access_control:
  default_policy: 'one_factor'

# OIDC provider config — Open-WebUI is the client
identity_providers:
  oidc:
    hmac_secret: '${AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET}'
    # Key is generated by setup.sh via: authelia crypto certificate rsa generate
    # and placed at authelia/private.pem by the setup script
    jwks:
      - key_id: 'default'
        algorithm: 'RS256'
        use: 'sig'
        key: {{ secret "/config/private.pem" | mindent 10 "|" | msquote }}
    clients:
      - client_id: 'open-webui'
        client_name: 'Open WebUI'
        client_secret: 'REPLACE_WITH_HASHED_SECRET'
        public: false
        authorization_policy: 'one_factor'
        redirect_uris:
          - 'https://chat.localtest.me/oauth/oidc/callback'
        scopes:
          - 'openid'
          - 'profile'
          - 'email'
        response_types:
          - 'code'
        grant_types:
          - 'authorization_code'
        access_token_signed_response_alg: 'none'
        userinfo_signed_response_alg: 'none'
        token_endpoint_auth_method: 'client_secret_basic'
        require_pkce: true
        pkce_challenge_method: 'S256'
