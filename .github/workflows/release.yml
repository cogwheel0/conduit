name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-release-notes:
    name: Generate Release Notes
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Release with Notes
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          generateReleaseNotes: true
          makeLatest: true

  prepare-generated-sources:
    name: Prepare Generated Sources
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Package Prepared Workspace
        run: |
          find lib -type f \
            \( -name '*.g.dart' -o -name '*.freezed.dart' \) \
            -print0 | tar --null -T - -czf generated-sources.tar.gz

      - name: Upload Generated Sources
        uses: actions/upload-artifact@v4
        with:
          name: generated-sources
          path: generated-sources.tar.gz

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs:
      - generate-release-notes
      - prepare-generated-sources
    permissions:
      contents: write

    steps:
        #1 Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Generated Sources
        uses: actions/download-artifact@v4
        with:
          name: generated-sources
          path: .

      - name: Extract Generated Sources
        run: tar -xzf generated-sources.tar.gz

        #2 Setup Java
      - name: Set Up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle and caching
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

        #3 Setup Flutter
      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create Android local.properties
        run: |
          cat > android/local.properties <<EOF
          sdk.dir=${ANDROID_SDK_ROOT}
          flutter.sdk=${FLUTTER_ROOT}
          EOF

        #4 Install Dependencies
      - name: Install Dependencies
        run: flutter pub get

      

        #5 Setup Keystore
      - name: Create Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > app/conduit-keystore.jks
          echo "${{ secrets.ANDROID_KEY_PROPERTIES_BASE64 }}" | base64 --decode > key.properties
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_PROPERTIES_BASE64: ${{ secrets.ANDROID_KEY_PROPERTIES_BASE64 }}
        working-directory: android
      
      - name: Build Android Release Artifacts
        working-directory: android
        run: ./gradlew app:assembleRelease app:bundleRelease -Psplit-per-abi=true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Android-Release
          path: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
            build/app/outputs/bundle/release/app-release.aab

      - name: Update Release with Artifacts
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/flutter-apk/app-arm64-v8a-release.apk,build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk,build/app/outputs/flutter-apk/app-x86_64-release.apk,build/app/outputs/bundle/release/app-release.aab"
          tag: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          makeLatest: true
          omitBody: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true


  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs:
      - generate-release-notes
      - prepare-generated-sources
    permissions:
      contents: write

    steps:
        #1 Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Generated Sources
        uses: actions/download-artifact@v4
        with:
          name: generated-sources
          path: .

      - name: Extract Generated Sources
        run: tar -xzf generated-sources.tar.gz

        #2 Setup Flutter
      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

        #3 Install Dependencies
      - name: Install Dependencies
        run: flutter pub get

      

        #4 Setup Xcode
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

        #5 Cache CocoaPods
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --verbose

        #6 Cache Xcode DerivedData
      - name: Cache Xcode DerivedData
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-xcode-${{ hashFiles('ios/Podfile.lock', 'ios/Runner.xcodeproj/project.pbxproj', 'pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-xcode-

      - name: Build iOS App
        run: |
          flutter build ios --release --no-codesign

        #7 Create IPA from App Bundle
      - name: Create IPA
        run: |
          mkdir -p build/ios/ipa
          cd build/ios/Release-iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r ../ipa/conduit.ipa Payload
          cd ../ipa

        #8 Upload Artifacts
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Release
          path: |
            build/ios/ipa/*.ipa

        #9 Update Release
      - name: Update Release with IPA
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/ios/ipa/conduit.ipa"
          tag: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          makeLatest: true
          omitBody: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
